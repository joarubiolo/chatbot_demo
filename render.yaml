services:
  - type: web
    name: chatbot-turismo-api
    runtime: docker
    repo: https://github.com/joarubiolo/chatbot_demo
    branch: main
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: google/gemini-2.5-flash
      - key: QDRANT_PATH
        value: ./qdrant_data
      - key: CORS_ORIGINS
        value: https://chatbot-demo-gules.vercel.app
      - key: MAX_TOKENS
        value: "300"
